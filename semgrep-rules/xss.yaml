rules:
  - id: xss-and-debug
    pattern-either:
      - pattern: echo $VAR;
      - pattern: var_dump($VAR);
    message: >
      User-supplied data is being directly output or a debug function
      has been detected in production code. This may lead to XSS
      vulnerabilities or sensitive data leakage.
    languages: [php]
    severity: WARNING

  - id: code-injection
    pattern-either:
      - pattern: eval($VAR);
      - pattern: shell_exec($VAR);
    message: >
      A dangerous code or command execution function has been detected.
      Uncontrolled input may lead to RCE or command injection.
    languages: [php]
    severity: ERROR
