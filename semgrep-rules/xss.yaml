rules:
  - id: php-xss-echo
    patterns:
      - pattern:echo $X;
      - pattern-not:echo htmlspecialchars($X);
    message: Potential XSS via echo
    severity: ERROR
    languages: [php]

  - id: php-xss-var-dump
    pattern: var_dump($X);
    message: Debug output
    severity: WARNING
    languages: [php]
