rules:
  - id: xss-and-debug
    pattern-either:
      - pattern: echo $VAR;
      - pattern: var_dump($VAR);
    message: >
      Kullanıcıdan gelen veri doğrudan çıktılanıyor veya debug fonksiyonu
      production kodunda tespit edildi. XSS açığına ya da hassas veri
      sızıntısına yol açabilir.
    languages: [php]
    severity: WARNING

  - id: code-injection
    pattern-either:
      - pattern: eval($VAR);
      - pattern: shell_exec($VAR);
    message: >
      Tehlikeli kod veya komut çalıştırma fonksiyonu tespit edildi.
      Kontrol edilmemiş girdiler RCE veya komut enjeksiyonuna yol açabilir.
    languages: [php]
    severity: ERROR
