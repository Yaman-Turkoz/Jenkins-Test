name: Semgrep Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan \
            --config=semgrep-rules/xss.yaml \
            --json \
            . > semgrep-report.json || true
          echo "--- Exit code: $?"
          echo "--- Dosya boyutu: $(wc -c < semgrep-report.json) byte"
          echo "--- JSON içeriği:"
          cat semgrep-report.json

      - name: Create GitHub Issues for findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import json, subprocess, os
          from collections import defaultdict

          with open('semgrep-report.json') as f:
              raw = f.read()

          print(f"Dosya boyutu: {len(raw)} byte")

          data = json.loads(raw)
          results = data.get('results', [])

          print(f"Toplam bulgu: {len(results)}")

          if not results:
              print("Temiz! Issue açılmayacak.")
              exit(0)

          # bulguları logla
          for r in results:
              print(f"  → {r['check_id']} | {r['path']}:{r['start']['line']}")

          repo  = os.environ['REPO']
          token = os.environ['GH_TOKEN']

          RULE_TITLES = {
              'xss-and-debug':  'XSS & Debug Vulnerabilities',
              'code-injection': 'Code Injection Vulnerabilities',
          }

          groups = defaultdict(list)
          for result in results:
              rule_id = result['check_id'].split('.')[-1]
              groups[rule_id].append(result)

          for rule_id, findings in groups.items():
              human_title = RULE_TITLES.get(rule_id, rule_id)
              title = f"[Semgrep] {human_title}"

              check = subprocess.run([
                  "gh", "issue", "list",
                  "--repo", repo,
                  "--state", "open",
                  "--search", title,
                  "--json", "title",
                  "--jq", ".[].title"
              ], capture_output=True, text=True,
                 env={**os.environ, "GH_TOKEN": token})

              existing_titles = check.stdout.strip().splitlines()

              if title in existing_titles:
                  print(f"⏭️  Zaten açık issue var, atlanıyor: {title}")
                  continue

              findings_md = ""
              for f in findings:
                  findings_md += f"- `{f['path']}` — satır {f['start']['line']}\n"

              message = findings[0]['extra']['message']

              body = f"""## Güvenlik Bulgusu

            **Kural:** `{rule_id}`
            
            ### Açıklama
            {message}
            
            ### Tespit Edilen Konumlar
            {findings_md}
            ---
            *Bu issue GitHub Actions Semgrep taraması tarafından otomatik oluşturuldu.*
            """

              subprocess.run([
                  "gh", "issue", "create",
                  "--repo", repo,
                  "--title", title,
                  "--body", body,
                  "--label", "security"
              ], env={**os.environ, "GH_TOKEN": token})

              print(f"✅ Issue açıldı: {title}")

          EOF

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json
