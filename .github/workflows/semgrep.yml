name: Semgrep Security Scan

# Ne zaman tetiklensin?
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest

    # Issue açabilmek için bu izni veriyoruz
    permissions:
      issues: write
      contents: read

    steps:
      # 1. Kodu çek
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Semgrep'i kur ve çalıştır, sonucu JSON'a yaz
      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan \
            --config=semgrep-rules/xss.yaml \
            --json \
            --output=semgrep-report.json \
            . || true
          # "|| true" → semgrep bulgu bulunca exit code 1 verir,
          # bu adımı fail ettirmemek için ekliyoruz

      # 3. Sonucu oku, bulgu varsa issue aç
      - name: Create GitHub Issues for findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Kaç bulgu var?
          FINDINGS=$(python3 -c "
          import json, sys
          with open('semgrep-report.json') as f:
              data = json.load(f)
          print(len(data.get('results', [])))
          ")

          echo "Toplam bulgu: $FINDINGS"

          if [ "$FINDINGS" -eq "0" ]; then
            echo "Temiz! Issue açılmayacak."
            exit 0
          fi

          # Her bulgu için ayrı issue aç
          python3 << 'EOF'
          import json, subprocess, os

          with open('semgrep-report.json') as f:
              data = json.load(f)

          repo  = os.environ['REPO']
          token = os.environ['GH_TOKEN']

          for result in data.get('results', []):
              rule_id   = result['check_id']
              file_path = result['path']
              line      = result['start']['line']
              message   = result['extra']['message']
              severity  = result['extra'].get('severity', 'WARNING')

              title = f"[Semgrep] {rule_id} — {file_path}:{line}"

              # Aynı başlıklı açık issue var mı kontrol et
              check = subprocess.run([
                  "gh", "issue", "list",
                  "--repo", repo,
                  "--state", "open",
                  "--search", title,
                  "--json", "title",
                  "--jq", ".[].title"
              ], capture_output=True, text=True,
                 env={**os.environ, "GH_TOKEN": token})

              existing_titles = check.stdout.strip().splitlines()

              if title in existing_titles:
                  print(f"⏭️  Zaten açık issue var, atlanıyor: {title}")
                  continue

              # Yoksa aç
              body = f"""## Güvenlik Bulgusu

            **Kural:** `{rule_id}`
            **Dosya:** `{file_path}`
            **Satır:** {line}
            **Önem:** {severity}
            
            ### Açıklama
            {message}
            
            ---
            *Bu issue GitHub Actions Semgrep taraması tarafından otomatik oluşturuldu.*
            """
              subprocess.run([
                  "gh", "issue", "create",
                  "--repo", repo,
                  "--title", title,
                  "--body", body,
                  "--label", "security"
              ], env={**os.environ, "GH_TOKEN": token})

              print(f"✅ Issue açıldı: {title}")

          EOF

      # 4. Raporu artifact olarak sakla (isteğe bağlı ama faydalı)
      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json
