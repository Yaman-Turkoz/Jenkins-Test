name: Semgrep Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan \
            --config=semgrep-rules/xss.yaml \
            --json \
            --output=semgrep-report.json \
            . || true

      - name: Create GitHub Issues for findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import json, subprocess, os
          from collections import defaultdict

          with open('semgrep-report.json') as f:
              data = json.load(f)

          results = data.get('results', [])
          repo  = os.environ['REPO']
          token = os.environ['GH_TOKEN']
          env   = {**os.environ, "GH_TOKEN": token}

          # Mevcut tüm [Semgrep] issue'larını sil
          existing = subprocess.run([
              "gh", "issue", "list",
              "--repo", repo,
              "--state", "open",
              "--label", "security",
              "--search", "[Semgrep]",
              "--json", "number",
              "--jq", ".[].number"
          ], capture_output=True, text=True, env=env)

          for number in existing.stdout.strip().splitlines():
              subprocess.run([
                  "gh", "issue", "delete", number,
                  "--repo", repo,
                  "--yes"
              ], env=env)
              print(f"🗑️  Issue #{number} silindi")

          if not results:
              print("Temiz! Issue açılmayacak.")
              exit(0)

          RULE_TITLES = {
              'xss-and-debug':  'XSS & Debug Vulnerabilities',
              'code-injection': 'Code Injection Vulnerabilities',
          }

          # Bulguları rule_id'ye göre grupla
          groups = defaultdict(list)
          for result in results:
              rule_id = result['check_id'].split('.')[-1]
              groups[rule_id].append(result)

          for rule_id, findings in groups.items():
              human_title = RULE_TITLES.get(rule_id, rule_id)
              title = f"[Semgrep] {human_title}"

              # Her bulguyu detaylıyla listele
              findings_md = ""
              for f in findings:
                  matched_code = f['extra'].get('lines', '').strip()
                  findings_md += (
                      f"**`{f['path']}` — satır {f['start']['line']}**\n"
                      f"```php\n{matched_code}\n```\n\n"
                  )

              message = findings[0]['extra']['message']

              body = f"""## Güvenlik Bulgusu

            **Kural:** `{rule_id}`
            
            ### Açıklama
            {message}
            
            ### Tespit Edilen Konumlar ({len(findings)} bulgu)
            {findings_md}
            ---
            *Bu issue GitHub Actions Semgrep taraması tarafından otomatik oluşturuldu.*
            """

              subprocess.run([
                  "gh", "issue", "create",
                  "--repo", repo,
                  "--title", title,
                  "--body", body,
                  "--label", "security"
              ], env=env)

              print(f"✅ Issue açıldı: {title} ({len(findings)} bulgu)")

          EOF

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json
