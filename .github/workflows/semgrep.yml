name: Semgrep Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed PHP files
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- '*.php' | tr '\n' ' ')
          echo "Changed PHP files: $FILES"
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run Semgrep
        run: |
          if [ -z "${{ steps.changed.outputs.files }}" ]; then
            echo "No PHP files changed. Skipping scan."
            echo '{"results": [], "errors": []}' > semgrep-report.json
            exit 0
          fi

          pip install semgrep
          semgrep scan ${{ steps.changed.outputs.files }} \
            --config=semgrep-rules/workflow-rules.yaml \
            --json \
            --output=semgrep-report.json || true

      - name: Create GitHub Issues for findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python3 scripts/create_issues.py

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json
