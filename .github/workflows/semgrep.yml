name: Semgrep Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Issues for findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import json, subprocess, os
          from collections import defaultdict

          with open('semgrep-report.json') as f:
              data = json.load(f)

          results = data.get('results', [])
          repo  = os.environ['REPO']
          token = os.environ['GH_TOKEN']
          env   = {**os.environ, "GH_TOKEN": token}

          # Mevcut [Semgrep] issue'larını kapat
          existing = subprocess.run([
              "gh", "issue", "list",
              "--repo", repo,
              "--state", "open",
              "--label", "security",
              "--json", "number,title",
              "--jq", '.[] | select(.title | startswith("[Semgrep]")) | .number'
          ], capture_output=True, text=True, env=env)

          for number in existing.stdout.strip().splitlines():
              subprocess.run([
                  "gh", "issue", "close", number,
                  "--repo", repo,
                  "--comment", "Yeni Semgrep taraması başlatıldı, bu issue yenileniyor."
              ], env=env)
              print(f"🔒 Issue #{number} kapatıldı")

          if not results:
              print("Temiz! Issue açılmayacak.")
              exit(0)

          RULE_TITLES = {
              'xss-and-debug':  'XSS & Debug Vulnerabilities',
              'code-injection': 'Code Injection Vulnerabilities',
          }

          # Bulguları rule_id'ye göre grupla
          groups = defaultdict(list)
          for result in results:
              rule_id = result['check_id'].split('.')[-1]
              groups[rule_id].append(result)

          for rule_id, findings in groups.items():
              human_title = RULE_TITLES.get(rule_id, rule_id)
              title = f"[Semgrep] {human_title}"

              findings_md = ""
              for f in findings:
                  # Dosyadan ilgili satırı oku
                  try:
                      with open(f['path']) as src:
                          file_lines = src.readlines()
                          matched_code = file_lines[f['start']['line'] - 1].strip()
                  except Exception:
                      matched_code = "(satır okunamadı)"

                  # Hangi fonksiyon/yapı eşleşti
                  check_id     = f['check_id'].split('.')[-1]
                  rule_message = f['extra']['message'].split('.')[0]

                  findings_md += (
                      f"**`{f['path']}` — satır {f['start']['line']}** "
                      f"(`{check_id}`)\n"
                      f"> {rule_message}\n"
                      f"```php\n{matched_code}\n```\n\n"
                  )

              message = findings[0]['extra']['message']

              body = f"""## Güvenlik Bulgusu

            **Kural:** `{rule_id}`
            
            ### Açıklama
            {message}
            
            ### Tespit Edilen Konumlar ({len(findings)} bulgu)
            {findings_md}
            ---
            *Bu issue GitHub Actions Semgrep taraması tarafından otomatik oluşturuldu.*
            """

              subprocess.run([
                  "gh", "issue", "create",
                  "--repo", repo,
                  "--title", title,
                  "--body", body,
                  "--label", "security"
              ], env=env)

              print(f"✅ Issue açıldı: {title} ({len(findings)} bulgu)")

          EOF

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json
